<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz cumpleaños Wilmar 🎉</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Gluten:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Fondo psicodélico constante */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #ff0055, #7f00ff, #00f0ff, #ff0055);
            background-size: 400% 400%;
            animation: fondoLoco 8s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', Impact, sans-serif;
            text-align: center;
            position: relative;
        }

        @keyframes fondoLoco {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor del contenido (Texto arriba, foto abajo) */
        .contenedor-contenido {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; 
            align-items: center;
            padding: 20px;
            z-index: 2; /* Debajo de los corazones 3D */
            box-sizing: border-box;
        }

        /* Efecto de luces parpadeantes exclusivo para el texto */
        .luces-texto {
            animation: pulsoLuces 0.5s linear infinite alternate;
        }

        @keyframes pulsoLuces {
            0% { filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 25px #ff0055); }
            100% { filter: drop-shadow(0 0 35px #00f0ff) drop-shadow(0 0 45px #7f00ff); }
        }

        /* Estilo base para los textos iniciales */
        .texto-cambiante {
            font-size: 2.8rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00f0ff;
            animation: vibrar 0.1s linear infinite;
            line-height: 1.2;
        }

        @keyframes vibrar {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(1deg); }
        }

        /* Clase limpia para TQQJ arriba */
        .fuente-burbuja {
            font-family: 'Gluten', cursive !important;
            font-size: 4.5rem !important;
            text-transform: none !important;
            letter-spacing: 0px !important;
            text-shadow: 4px 4px 0px #00f0ff, -3px -3px 0px #7f00ff !important;
            animation: vibrar 0.15s linear infinite;
            margin: 0;
        }

        /* Marco redondo gigante */
        .foto-sorpresa {
            display: none;
            width: 75vw;         
            height: 75vw;        
            max-width: 380px;    
            max-height: 380px;
            object-fit: cover;   
            border-radius: 50%;  
            border: 6px solid #fff;
            box-shadow: 0 0 30px #00ff66, 0 0 15px #fff;
            animation: pulsoFoto 1s ease-in-out infinite alternate;
        }

        @keyframes pulsoFoto {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px #00ff66); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 25px #00ffff); }
        }

        /* El botón interactivo principal */
        .boton-aleatorio {
            position: absolute;
            z-index: 3; /* Justo debajo del canvas superior para que lo crucen los corazones */
            padding: 15px 30px;
            font-size: 1.1rem;
            font-family: 'Arial Black', sans-serif;
            color: #fff;
            background-color: #00ff66;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 0px 20px #00ff66, inset 0 0 10px #fff;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.2s ease;
            animation: flotarBoton 2s ease-in-out infinite alternate;
        }

        .boton-aleatorio:active {
            transform: scale(0.9);
            background-color: #00ffff;
            box-shadow: 0px 0px 20px #00ffff;
        }

        @keyframes flotarBoton {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        /* Botón de repetir flotante */
        .boton-repetir {
            display: none; 
            position: absolute;
            bottom: 60px;
            right: 25px;
            z-index: 15; /* Siempre accesible por encima del canvas */
            width: 52px;
            height: 52px;
            font-size: 1.6rem;
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .boton-repetir:active {
            transform: rotate(-180deg) scale(0.9);
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* CANVAS MODIFICADO: Capa superior absoluta (Pasa por encima de TODO) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100; /* Pasa por encima de textos, imágenes y botones */
            pointer-events: none; /* Crucial: Permite hacer clic a través de los corazones */
        }
    </style>
</head>
<body>

    <canvas id="corazonesCanvas"></canvas>

    <div class="contenedor-contenido">
        <div class="luces-texto">
            <h1 id="textoPrincipal" class="texto-cambiante">¡FELIZ<br>CUMPLEAÑOS!</h1>
        </div>
        
        <img id="imagenFinal" src="foto.jpg" alt="Foto Sorpresa" class="foto-sorpresa">
    </div>

    <button id="btnSiguiente" class="boton-aleatorio">¡DALE DURO AQUÍ! 💥</button>

    <button id="btnRepetir" class="boton-repetir" title="Repetir">🔄</button>

    <script>
        const textoPrincipal = document.getElementById("textoPrincipal");
        const btnSiguiente = document.getElementById("btnSiguiente");
        const imagenFinal = document.getElementById("imagenFinal");
        const btnRepetir = document.getElementById("btnRepetir");
        
        let faseActual = 0;

        btnRepetir.style.display = "none";

        function moverBotonAleatoriamente() {
            const minTop = window.innerHeight / 2;
            const maxTop = window.innerHeight - 120;
            const maxLeft = window.innerWidth - 180;

            const randomTop = Math.floor(Math.random() * (maxTop - minTop)) + minTop;
            const randomLeft = Math.max(20, Math.floor(Math.random() * maxLeft));

            btnSiguiente.style.top = randomTop + "px";
            btnSiguiente.style.left = randomLeft + "px";
        }

        moverBotonAleatoriamente();

        btnSiguiente.addEventListener("click", () => {
            faseActual++;

            if (faseActual === 1) {
                textoPrincipal.innerHTML = "MI<br>MUCHACHONA<br>&lt;3";
                btnSiguiente.innerHTML = "¡OTRA VEZ! 💥";
                moverBotonAleatoriamente();
            } 
            else if (faseActual === 2) {
                textoPrincipal.className = "fuente-burbuja"; 
                textoPrincipal.innerHTML = "TQQJ";
                
                imagenFinal.style.display = "block"; 
                btnSiguiente.style.display = "none"; 
                btnRepetir.style.display = "flex"; 
            }
        });

        btnRepetir.addEventListener("click", () => {
            faseActual = 0; 
            textoPrincipal.className = "texto-cambiante";
            textoPrincipal.innerHTML = "¡FELIZ<br>CUMPLEAÑOS!";
            imagenFinal.style.display = "none";
            btnRepetir.style.display = "none";
            btnSiguiente.style.display = "block";
            btnSiguiente.innerHTML = "¡DALE DURO AQUÍ! 💥";
            moverBotonAleatoriamente();
        });

        // --- SISTEMA DE CORAZONES CON EFECTO 3D AVANZADO ---
        const canvas = document.getElementById("corazonesCanvas");
        const ctx = canvas.getContext("2d");
        let ancho = canvas.width = window.innerWidth;
        let alto = canvas.height = window.innerHeight;

        const corazones = [];

        class Corazon {
            constructor() {
                this.reiniciar();
                // Distribución inicial aleatoria para que no salgan todos juntos al cargar
                this.y = Math.random() * alto; 
            }

            reiniciar() {
                this.x = Math.random() * ancho;
                this.y = alto + Math.random() * 40;
                
                // LÓGICA 3D: Z representa la distancia (1 es el fondo, 0 es la pantalla del usuario)
                this.z = Math.random() * 0.7 + 0.3; // Nace al fondo
                this.velocidadZ = Math.random() * 0.004 + 0.003; // Qué tan rápido se acerca a la cara
                
                this.tamanoBase = Math.random() * 10 + 8; // Tamaño cuando está lejos
                this.velocidadX = Math.random() * 3 - 1.5;
                this.velocidadY = Math.random() * -4 - 2; // Sube constantemente
                this.gravedad = 0.04;
                this.opacidad = Math.random() * 0.3 + 0.7;
            }

            actualizar() {
                // Se acerca en el eje Z (disminuye la distancia hacia la pantalla)
                this.z -= this.velocidadZ;
                
                this.x += this.velocidadX;
                this.velocidadY += this.gravedad;
                this.y += this.velocidadY;

                // Si el corazón se acerca demasiado al "lente" o se sale de los bordes, reinicia
                if (this.z <= 0.05 || this.y < -100 || this.x < -100 || this.x > ancho + 100) {
                    this.reiniciar();
                }
            }

            dibujar() {
                ctx.save();
                
                // Efecto tridimensional: El tamaño actual es inversamente proporcional a la distancia Z
                let escala3D = 1 / this.z;
                let tamanoFinal = this.tamanoBase * escala3D;
                
                // Difuminar un poco los que estén excesivamente cerca para realismo de cámara
                let alfaFinal = this.opacidad;
                if (this.z < 0.2) {
                    alfaFinal *= (this.z / 0.2); // Se desvanece suavemente antes de chocar la pantalla
                }

                ctx.globalAlpha = Math.max(0, alfaFinal);
                ctx.fillStyle = "#ff0000";
                
                // Añadir una ligera sombra paralela dinámica para acentuar el 3D por encima del contenido
                ctx.shadowColor = "rgba(0, 0, 0, 0.3)";
                ctx.shadowBlur = escala3D * 2;
                ctx.shadowOffsetY = escala3D;

                ctx.beginPath();
                let topY = this.y - tamanoFinal / 2;
                ctx.moveTo(this.x, topY + tamanoFinal / 4);
                ctx.bezierCurveTo(this.x, topY, this.x - tamanoFinal / 2, topY, this.x - tamanoFinal / 2, topY + tamanoFinal / 4);
                ctx.bezierCurveTo(this.x - tamanoFinal / 2, topY + (tamanoFinal * 5) / 8, this.x, topY + (tamanoFinal * 7) / 8, this.x, this.y + tamanoFinal / 2);
                ctx.bezierCurveTo(this.x, topY + (tamanoFinal * 7) / 8, this.x + tamanoFinal / 2, topY + (tamanoFinal * 5) / 8, this.x + tamanoFinal / 2, topY + tamanoFinal / 4);
                ctx.bezierCurveTo(this.x + tamanoFinal / 2, topY, this.x, topY, this.x, topY + tamanoFinal / 4);
                ctx.fill();
                ctx.restore();
            }
        }

        // Generamos 65 corazones interactivos en perspectiva
        for (let i = 0; i < 65; i++) {
            corazones.push(new Corazon());
        }

        function animar() {
            ctx.clearRect(0, 0, ancho, alto);
            
            // Ordenar los corazones para pintar primero los del fondo (Z grande) y al final los de adelante (Z chico)
            // Esto evita que un corazón del fondo tape erróneamente a uno de adelante
            corazones.sort((a, b) => b.z - a.z);

            corazones.forEach(c => {
                c.actualizar();
                c.dibujar();
            });
            requestAnimationFrame(animar);
        }

        animar();

        window.addEventListener("resize", () => {
            ancho = canvas.width = window.innerWidth;
            alto = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
