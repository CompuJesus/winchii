<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz cumpleaños Wilmar 🎉</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Gluten:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Fondo psicodélico constante */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #ff0055, #7f00ff, #00f0ff, #ff0055);
            background-size: 400% 400%;
            animation: fondoLoco 8s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrado vertical absoluto */
            align-items: center;     /* Centrado horizontal absoluto */
            overflow: hidden;
            font-family: 'Arial Black', Impact, sans-serif;
            text-align: center;
            position: relative;
        }

        @keyframes fondoLoco {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CONTENEDOR CENTRAL: Todo agrupado firmemente en el medio de la pantalla */
        .contenedor-contenido {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px; /* Espacio controlado entre el texto y la foto */
            padding: 20px;
            z-index: 2;
            box-sizing: border-box;
        }

        /* Efecto de luces parpadeantes exclusivo para el texto */
        .luces-texto {
            animation: pulsoLuces 0.5s linear infinite alternate;
        }

        @keyframes pulsoLuces {
            0% { filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 25px #ff0055); }
            100% { filter: drop-shadow(0 0 35px #00f0ff) drop-shadow(0 0 45px #7f00ff); }
        }

        /* Estilo base para los textos iniciales */
        .texto-cambiante {
            font-size: 2.8rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00f0ff;
            animation: vibrar 0.1s linear infinite;
            line-height: 1.2;
        }

        @keyframes vibrar {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(1deg); }
        }

        /* Clase limpia para TQQJ arriba */
        .fuente-burbuja {
            font-family: 'Gluten', cursive !important;
            font-size: 4.2rem !important;
            text-transform: none !important;
            letter-spacing: 0px !important;
            text-shadow: 4px 4px 0px #00f0ff, -3px -3px 0px #7f00ff !important;
            animation: vibrar 0.15s linear infinite;
            margin: 0;
        }

        /* Marco redondo gigante y centrado */
        .foto-sorpresa {
            display: none;
            width: 70vw;         
            height: 70vw;        
            max-width: 320px;    /* Un tamaño más controlado para PC y móviles */
            max-height: 320px;
            object-fit: cover;   
            border-radius: 50%;  
            border: 6px solid #fff;
            box-shadow: 0 0 30px #00ff66, 0 0 15px #fff;
            animation: pulsoFoto 1s ease-in-out infinite alternate;
        }

        @keyframes pulsoFoto {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px #00ff66); }
            100% { transform: scale(1.02); filter: drop-shadow(0 0 25px #00ffff); }
        }

        /* El botón interactivo principal abajo */
        .boton-aleatorio {
            position: absolute;
            z-index: 3; 
            padding: 15px 30px;
            font-size: 1.1rem;
            font-family: 'Arial Black', sans-serif;
            color: #fff;
            background-color: #00ff66;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 0px 20px #00ff66, inset 0 0 10px #fff;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.2s ease;
            animation: flotarBoton 2s ease-in-out infinite alternate;
        }

        .boton-aleatorio:active {
            transform: scale(0.9);
            background-color: #00ffff;
            box-shadow: 0px 0px 20px #00ffff;
        }

        @keyframes flotarBoton {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        /* Botón de repetir flotante */
        .boton-repetir {
            display: none; 
            position: absolute;
            bottom: 60px;
            right: 25px;
            z-index: 15; 
            width: 52px;
            height: 52px;
            font-size: 1.6rem;
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .boton-repetir:active {
            transform: rotate(-180deg) scale(0.9);
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* Canvas en capa superior para el cruce tridimensional */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <canvas id="corazonesCanvas"></canvas>

    <div class="contenedor-contenido">
        <div class="luces-texto">
            <h1 id="textoPrincipal" class="texto-cambiante">¡FELIZ<br>CUMPLEAÑOS!</h1>
        </div>
        <img id="imagenFinal" src="foto.jpg" alt="Foto Sorpresa" class="foto-sorpresa">
    </div>

    <button id="btnSiguiente" class="boton-aleatorio">¡DALE DURO AQUÍ! 💥</button>

    <button id="btnRepetir" class="boton-repetir" title="Repetir">🔄</button>

    <script>
        const textoPrincipal = document.getElementById("textoPrincipal");
        const btnSiguiente = document.getElementById("btnSiguiente");
        const imagenFinal = document.getElementById("imagenFinal");
        const btnRepetir = document.getElementById("btnRepetir");
        
        let faseActual = 0;

        btnRepetir.style.display = "none";

        function moverBotonAleatoriamente() {
            const minTop = window.innerHeight / 2;
            const maxTop = window.innerHeight - 120;
            const maxLeft = window.innerWidth - 180;

            const randomTop = Math.floor(Math.random() * (maxTop - minTop)) + minTop;
            const randomLeft = Math.max(20, Math.floor(Math.random() * maxLeft));

            btnSiguiente.style.top = randomTop + "px";
            btnSiguiente.style.left = randomLeft + "px";
        }

        moverBotonAleatoriamente();

        btnSiguiente.addEventListener("click", () => {
            faseActual++;

            if (faseActual === 1) {
                textoPrincipal.innerHTML = "MI<br>MUCHACHONA<br>&lt;3";
                btnSiguiente.innerHTML = "¡OTRA VEZ! 💥";
                moverBotonAleatoriamente();
            } 
            else if (faseActual === 2) {
                textoPrincipal.className = "fuente-burbuja"; 
                textoPrincipal.innerHTML = "TQQJ";
                
                imagenFinal.style.display = "block"; 
                btnSiguiente.style.display = "none"; 
                btnRepetir.style.display = "flex"; 
            }
        });

        btnRepetir.addEventListener("click", () => {
            faseActual = 0; 
            textoPrincipal.className = "texto-cambiante";
            textoPrincipal.innerHTML = "¡FELIZ<br>CUMPLEAÑOS!";
            imagenFinal.style.display = "none";
            btnRepetir.style.display = "none";
            btnSiguiente.style.display = "block";
            btnSiguiente.innerHTML = "¡DALE DURO AQUÍ! 💥";
            moverBotonAleatoriamente();
        });

        // --- SISTEMA DE CORAZONES REDISTRIBUIDO ---
        const canvas = document.getElementById("corazonesCanvas");
        const ctx = canvas.getContext("2d");
        let ancho = canvas.width = window.innerWidth;
        let alto = canvas.height = window.innerHeight;

        const corazones = [];

        class Corazon {
            constructor(inicializarEnPantalla = false) {
                this.x = Math.random() * ancho;
                
                // Si es la carga inicial, los esparce por toda la pantalla (eje Y)
                if (inicializarEnPantalla) {
                    this.y = Math.random() * alto;
                } else {
                    this.y = alto + Math.random() * 40;
                }
                
                // Lógica Z (1 es fondo, 0 adelante)
                this.z = Math.random() * 0.7 + 0.3; 
                this.velocidadZ = Math.random() * 0.003 + 0.002; 
                
                this.tamanoBase = Math.random() * 8 + 6; // Un poco más pequeños de base
                this.velocidadX = Math.random() * 2 - 1;
                this.velocidadY = Math.random() * -3 - 1.5; 
                this.gravedad = 0.03;
                this.opacidad = Math.random() * 0.3 + 0.6;
            }

            actualizar() {
                this.z -= this.velocidadZ;
                this.x += this.velocidadX;
                this.velocidadY += this.gravedad;
                this.y += this.velocidadY;

                // Al salir o acercarse demasiado, reaparecen abajo limpiamente
                if (this.z <= 0.08 || this.y < -80 || this.x < -80 || this.x > ancho + 80) {
                    this.x = Math.random() * ancho;
                    this.y = alto + Math.random() * 40;
                    this.z = Math.random() * 0.7 + 0.3;
                    this.velocidadY = Math.random() * -3 - 1.5;
                    this.velocidadX = Math.random() * 2 - 1;
                }
            }

            dibujar() {
                ctx.save();
                
                let escala3D = 1 / this.z;
                // Controlamos que el tamaño final no se desorbite (máximo escala 5x)
                let tamanoFinal = this.tamanoBase * Math.min(escala3D, 5);
                
                let alfaFinal = this.opacidad;
                if (this.z < 0.2) {
                    alfaFinal *= (this.z / 0.2); 
                }

                ctx.globalAlpha = Math.max(0, alfaFinal);
                ctx.fillStyle = "#ff0000";
                
                ctx.shadowColor = "rgba(0, 0, 0, 0.2)";
                ctx.shadowBlur = escala3D * 1.5;
                ctx.shadowOffsetY = escala3D;

                ctx.beginPath();
                let topY = this.y - tamanoFinal / 2;
                ctx.moveTo(this.x, topY + tamanoFinal / 4);
                ctx.bezierCurveTo(this.x, topY, this.x - tamanoFinal / 2, topY, this.x - tamanoFinal / 2, topY + tamanoFinal / 4);
                ctx.bezierCurveTo(this.x - tamanoFinal / 2, topY + (tamanoFinal * 5) / 8, this.x, topY + (tamanoFinal * 7) / 8, this.x, this.y + tamanoFinal / 2);
                ctx.bezierCurveTo(this.x, topY + (tamanoFinal * 7) / 8, this.x + tamanoFinal / 2, topY + (tamanoFinal * 5) / 8, this.x + tamanoFinal / 2, topY + tamanoFinal / 4);
                ctx.bezierCurveTo(this.x + tamanoFinal / 2, topY, this.x, topY, this.x, topY + tamanoFinal / 4);
                ctx.fill();
                ctx.restore();
            }
        }

        // Reducido a 40 corazones bien distribuidos desde el inicio
        for (let i = 0; i < 40; i++) {
            corazones.push(new Corazon(true)); // true fuerza la distribución inicial por toda la pantalla
        }

        function animar() {
            ctx.clearRect(0, 0, ancho, alto);
            corazones.sort((a, b) => b.z - a.z);
            corazones.forEach(c => {
                c.actualizar();
                c.dibujar();
            });
            requestAnimationFrame(animar);
        }

        animar();

        window.addEventListener("resize", () => {
            ancho = canvas.width = window.innerWidth;
            alto = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
